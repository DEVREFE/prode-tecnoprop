name: Sync Matches

on:
  schedule:
    # GitHub Actions permite crons cada 5 minutos, aunque a veces puede haber una ligera demora en iniciar.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Esto te permite ejecutarlo a mano desde la página de GitHub si querés.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de sync-matches
        run: |
          curl -f -X GET "https://prode.tecnoprop.ar/api/sync-matches?secret=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
